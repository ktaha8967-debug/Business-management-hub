name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Initialize Capacitor Android
        run: |
          npx cap add android || echo "Android platform already added"

      - name: Sync Capacitor Projects
        run: npx cap sync

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android App (APK)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Build Artifact (APK)
        uses: actions/upload-artifact@v4
        with:
          name: ascentra-command-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
